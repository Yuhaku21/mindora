<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Daguku Mitra</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Poppins', sans-serif;
    background: #ffffff;
}

.auth-container{
    max-width: 400px;
    margin: auto;
    min-height: 100vh;
    display: flex;
    align-items: center;
}

.auth-card{
    width: 100%;
    padding: 35px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.form-control{
    border-radius: 12px;
    padding: 12px;
}

.btn-primary{
    border-radius: 12px;
    padding: 12px;
    font-weight: 500;
}

.logo{
    font-weight: 700;
    font-size: 22px;
    color: #4f46e5;
}
</style>
</head>

<body>

<div class="auth-container">
    <div class="auth-card">

        <div class="text-center mb-4">
            <div class="logo">
                <img src="mindora.png" alt="" width="250px">
            </div>
            <small class="text-muted">Masuk ke akun Anda</small>
        </div>

        <form action="proses_login.php" method="POST">

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="password" class="form-control" required>
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary">Login</button>
            </div>

            <div class="text-center">
                <small>Belum punya akun? 
                    <a href="register.php">Daftar</a>
                </small>
            </div>

        </form>

    </div>
</div>

<script>
function togglePassword(){
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
