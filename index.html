<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daguku Mitra</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d6efd" />

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #ffffff;
        }

        .app-container {
            max-width: 420px;
            margin: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 80px; /* ⬅️ TAMBAHAN */
        }

        .header {
            padding: 20px;
            font-weight: 600;
            font-size: 18px;
        }

        .install-btn {
            background: #4f46e5;
            color: white;
            border-radius: 12px;
            font-size: 13px;
            padding: 6px 15px;
        }

        .greeting {
            padding: 0 20px;
        }

        .balance-card {
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
            background: #f8fafc;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .deposit-btn {
            border-radius: 12px;
            font-size: 13px;
        }

        .quick-menu {
            padding: 0 20px;
        }

        .quick-menu .btn {
            border-radius: 15px;
            font-size: 13px;
            background: #f1f5f9;
            border: none;
        }

        .main-menu {
            padding: 20px;
        }

        .menu-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            transition: 0.2s;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: translateY(-5px);
        }

        .menu-icon {
            font-size: 24px;
            color: #4f46e5;
            margin-bottom: 10px;
        }

        .bottom-nav {
            margin-top: auto;
            border-top: 1px solid #eee;
            padding: 10px 0;
            background: #fff;
        }

        .bottom-nav a {
            text-decoration: none;
            font-size: 12px;
            color: #6b7280;
        }

        .bottom-nav a.active {
            color: #4f46e5;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="app-container">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center header border-bottom mb-4">
            <div>
                <img src="../asset/Group 3.png" alt="" width="100px">
            </div>
            <button id="installBtn" class="btn install-btn">Install</button>
        </div>

        <!-- Greeting -->
        <div class="greeting">
            <small class="text-muted">Selamat Pagi</small>
            <h6 class="fw-semibold mt-1">Halo, Muhammad Farhan<br>Indra Saputra</h6>
        </div>

        <!-- Balance -->
        <div class="balance-card d-flex justify-content-between align-items-center">
            <div>
                <div>Saldo <strong>Rp 100.000</strong></div>
                <small class="text-muted">Point 500</small>
            </div>
            <button class="btn btn-outline-primary deposit-btn">Deposit</button>
        </div>

        <!-- Quick Menu -->
        <div class="quick-menu d-flex justify-content-between">
            <button class="btn w-100 me-2"><i class="bi bi-phone"></i> Pulsa</button>
            <button class="btn w-100 me-2"><i class="bi bi-wallet2"></i> Top-Up</button>
            <button class="btn w-100"><i class="bi bi-receipt"></i> Tagihan</button>
        </div>

        <!-- Main Menu -->
        <div class="main-menu">
            <div class="row g-3">
                <div class="col-6">
                    <div class="menu-card" onclick="menuClick('Pulsa')">
                        <div class="menu-icon">📱</div>
                        <p style="font-size: 14px;">Digital</p>
                    </div>
                </div>
                <div class="col-6">
                    <div class="menu-card" onclick="menuClick('Belanja')">
                        <div class="menu-icon">🥦</div>
                        <p style="font-size: 14px;">Fresh Market</p>
                    </div>
                </div>
                <div class="col-6">
                    <div class="menu-card" onclick="menuClick('Belanja')">
                        <div class="menu-icon">🛒</div>
                        <p style="font-size: 14px;">Kurir</p>
                    </div>
                </div>
                <div class="col-6">
                    <div class="menu-card" onclick="menuClick('Belanja')">
                        <div class="menu-icon">🛵</div>
                        <p style="font-size: 14px;">Ojek</p>
                    </div>
                </div>
            </div>
            
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav d-flex justify-content-around text-center fixed-bottom">
            <a href="#" class="active">
                <div><i class="bi bi-house"></i></div>
                Beranda
            </a>
            <a href="#">
                <div><i class="bi bi-star"></i></div>
                Point
            </a>
            <a href="#">
                <div><i class="bi bi-clock-history"></i></div>
                Transaksi
            </a>
            <a href="#">
                <div><i class="bi bi-person"></i></div>
                Profile
            </a>
        </div>

    </div>
    <script src="install.js"></script>
    <!--Script untuk service worker-->
    <script src="main.js"></script>
    <script>
        function menuClick(menu) {
            alert("Menu dipilih: " + menu);
        }
    </script>

</body>

</html>
